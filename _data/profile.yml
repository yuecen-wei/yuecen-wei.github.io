short_bio: >-
  <p>
    I am currently a Ph.D. candidate at the School of Software at Beihang University. My research interests include
    graph learning and privacy protection, with a focus on graph representation learning, privacy-preserving machine
    learning, membership inference attacks, and geometric deep learning.
  </p>
  <p>
    I have published several papers in venues including The Web Conference (WWW), KDD, AAAI, ICDM, IJCAI, CVPR, and
    Knowledge and Information Systems. According to Google Scholar records retrieved in July 2026, my work has 200+
    citations.
  </p>

